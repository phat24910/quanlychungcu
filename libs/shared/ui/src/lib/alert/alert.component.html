<div class="alert-wrapper" *ngIf="messages?.length">
  <div *ngFor="let item of messagesInternal" class="alert-card">
    <div class="alert-body">
      <div class="alert-icon">
        <i nz-icon nzType="exclamation-circle" nzTheme="outline" class="icon"></i>
      </div>
      <div class="alert-content">
        <div class="alert-title">Thông báo</div>
        <div class="alert-message">{{ item.text }}</div>
      </div>
      <button class="alert-close" (click)="removeById(item.id)" aria-label="close">
        <i nz-icon nzType="close" nzTheme="outline"></i>
      </button>
    </div>
  </div>
</div>
