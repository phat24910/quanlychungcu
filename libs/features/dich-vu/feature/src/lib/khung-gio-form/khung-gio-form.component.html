<div class="khung-gio-form p-2">
  <nz-spin [nzSpinning]="loading">
    <div class="space-y-6">
      <!-- Name -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Tên khung giờ </label>
         <input nz-input [(ngModel)]="model.tenKhungGio" [readonly]="readOnly"
           placeholder="Ví dụ: Giờ cao điểm, Giờ hành chính..." class="rounded-lg h-10" />
      </div>

      <!-- Time Range -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Giờ bắt đầu</label>
          <input nz-input type="time" [(ngModel)]="model.gioBatDau" [readonly]="readOnly" class="rounded-lg h-10" />
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Giờ kết thúc</label>
          <input nz-input type="time" [(ngModel)]="model.gioKetThuc" [readonly]="readOnly" class="rounded-lg h-10" />
        </div>
      </div>

      <!-- Day of week -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Áp dụng cho ngày</label>
        <div *ngIf="!readOnly">
          <nz-select class="w-full rounded-lg" [(ngModel)]="model.ngayTrongTuan" nzAllowClear nzPlaceHolder="Mọi ngày trong tuần">
            <nz-option *ngFor="let d of ngayTrongTuanOptions" [nzValue]="(d.value !== undefined && d.value !== null) ? d.value : d.id" [nzLabel]="d.label || d.name || d.ten || d.text"></nz-option>
          </nz-select>
        </div>
        <div *ngIf="readOnly" class="w-full text-sm text-gray-800">{{ getNgayTrongTuanLabel(model.ngayTrongTuan) }}</div>
        <p class="text-[11px] text-gray-400 mt-1 italic">Để trống nếu khung giờ này áp dụng cho tất cả các ngày.</p>
      </div>

      <!-- Footer Actions (only if not in modal or handled by modal) -->
      <div class="flex justify-end gap-3 pt-4 border-t border-gray-100" *ngIf="!inModal">
        <button nz-button type="button" (click)="cancel()" class="rounded-lg px-6">Hủy bỏ</button>
        <button nz-button nzType="primary" type="button" (click)="save()" [disabled]="readOnly"
                class="rounded-lg px-8 bg-blue-600 font-bold">Lưu thông tin</button>
      </div>

      <!-- If in modal, we usually use the modal footer, but if [nzFooter]="null" was set in parent, we need buttons here -->
      <div class="flex justify-end gap-3 pt-4 border-t border-gray-100" *ngIf="inModal && !readOnly">
        <button nz-button type="button" (click)="cancel()" class="rounded-lg px-4">Hủy</button>
        <button nz-button nzType="primary" type="button" (click)="save()"
                class="rounded-lg px-6 bg-blue-600 font-bold">Xác nhận</button>
      </div>
    </div>
  </nz-spin>
</div>
