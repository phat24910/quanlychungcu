<div class="dich-vu-list p-4">
  <div class="page-toolbar flex justify-between items-center flex-wrap gap-2 sm:gap-3 mb-4" style="width:100%">
     <div style="display:flex;align-items:center;gap:12px;width:100%;flex-wrap:wrap">
       <div style="display:flex;align-items:center;gap:8px;flex:0 0 auto;flex-wrap:wrap">
         <input nz-input placeholder="Nhập mã hoặc tên dịch vụ" [(ngModel)]="keyword" (keydown.enter)="onSearch()"
           class="w-full sm:w-80" style="border-radius:8px;padding:8px 12px;border:1px solid #e5e7eb;height:40px;box-sizing:border-box" />
         <button nz-button (click)="onSearch()"
           style="display:flex;align-items:center;background:#0b84e6;border-color:#0b84e6;color:#fff;border-radius:8px;padding:6px 14px;font-weight:600;height:40px;box-sizing:border-box">
           <i nz-icon nzType="search" nzTheme="outline"></i>&nbsp;Tìm kiếm</button>
         <button nz-button type="button" (click)="toggleAdvanced()"
           style="height:40px;padding:6px 12px;border-radius:6px;display:flex;align-items:center;gap:8px;font-weight:600;margin-left:6px">
           <i nz-icon nzType="filter" nzTheme="outline"></i>
           <span class="hidden sm:inline">Tìm nâng cao</span>
         </button>
       </div>

       <div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
         <button *ngIf="setOfCheckedId.size > 0" nz-button nzType="primary" nzDanger (click)="deleteSelectedMultiple()"
           style="display:flex;align-items:center;border-radius:8px;padding:6px 12px;font-weight:600;height:40px;box-sizing:border-box">
           <i nz-icon nzType="delete" nzTheme="outline"></i>&nbsp;<span class="hidden sm:inline">Xóa đã chọn</span></button>

         <button *ngIf="setOfCheckedId.size > 0" nz-button type="button" (click)="activateSelected()"
           style="height:40px;padding:6px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;font-weight:600;border:1px solid #10b981;background:#ecfdf5;color:#065f46">
           <i nz-icon nzType="check" nzTheme="outline"></i>&nbsp;<span class="hidden sm:inline">Kích hoạt đã chọn</span></button>

         <button *ngIf="setOfCheckedId.size > 0" nz-button nzDanger type="button" (click)="revokeSelected()"
           style="height:40px;padding:6px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;font-weight:600;">
           <i nz-icon nzType="stop" nzTheme="outline"></i>&nbsp;<span class="hidden sm:inline">Thu hồi đã chọn</span></button>

         <button nz-button type="button" (click)="onRefresh()"
           style="height:40px;padding:6px 12px;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;border:1px solid #60a5fa;background:#eff6ff;color:#1e3a8a">
           <i nz-icon nzType="reload" nzTheme="outline"
             style="font-size:20px;line-height:20px;transform:scale(1.06);display:inline-block;color:#1e3a8a"></i>
         </button>

         <button nz-button nzType="primary" type="button" (click)="openCreateModal()"
           style="height:40px;padding:6px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.06)">
           <i nz-icon nzType="plus-circle" nzTheme="outline"></i>
           <span class="hidden sm:inline">Thêm dịch vụ</span>
         </button>
       </div>
     </div>
  </div>

  <nz-modal [(nzVisible)]="advancedVisible" nzTitle="Tìm kiếm nâng cao" (nzOnCancel)="toggleAdvanced()"
    [nzFooter]="null" nzWrapClassName="advanced-search-modal">
    <ng-container *nzModalContent>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3" style="margin-top:4px">
        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Loại dịch vụ</label>
          <nz-select [(ngModel)]="loaiDichVuId" [ngModelOptions]="{standalone:true}" nzAllowClear
            nzPlaceHolder="-- Tất cả --" style="width:100%;border-radius:8px;border:1px solid #e5e7eb;">
            <nz-option *ngFor="let o of loaiDichVuOptions" [nzValue]="o.id"
              [nzLabel]="o.name || o.ten || o.label"></nz-option>
          </nz-select>
        </div>

        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Đối tác</label>
          <nz-select [(ngModel)]="doiTacId" [ngModelOptions]="{standalone:true}" nzAllowClear
            nzPlaceHolder="-- Tất cả --" style="width:100%;border-radius:8px;border:1px solid #e5e7eb;">
            <nz-option *ngFor="let o of doiTacOptions" [nzValue]="o.id || o.doiTacId" [nzLabel]="o.tenDoiTac || o.tenCongTy || o.name || o.label"></nz-option>
          </nz-select>
        </div>

        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Trạng thái</label>
          <nz-select [(ngModel)]="trangThaiDichVuId" [ngModelOptions]="{standalone:true}" nzAllowClear
            nzPlaceHolder="-- Tất cả --" style="width:100%;border-radius:8px;border:1px solid #e5e7eb;">
            <nz-option *ngFor="let o of trangThaiOptions" [nzValue]="o.id" [nzLabel]="o.name || o.ten || o.label"></nz-option>
          </nz-select>
        </div>
      </div>

      <div style="margin-top:12px;display:flex;justify-content:flex-end;gap:8px">
        <button nz-button type="button" (click)="closeAdvanced()" class="rounded-lg">Hủy</button>
        <button nz-button nzType="primary" type="button" (click)="applyAdvanced()" class="rounded-lg">Áp dụng</button>
      </div>
    </ng-container>
  </nz-modal>

  <nz-modal [(nzVisible)]="detailVisible" nzTitle="Chi tiết dịch vụ" (nzOnCancel)="detailVisible=false" [nzFooter]="null" nzWidth="1100" nzWrapClassName="custom-modal modal-xl">
    <ng-container *nzModalContent>
      <app-dich-vu-detail [inModal]="true" [itemId]="detailId" (closed)="detailVisible=false" (changed)="onDetailChanged()"></app-dich-vu-detail>
    </ng-container>
  </nz-modal>

  <app-scroll-table [height]="'420px'">
    <nz-table [nzData]="list" [nzLoading]="loading" nzBordered [nzShowPagination]="false" style="min-width:980px">
      <thead>
        <tr>
          <th style="width:48px">
            <label nz-checkbox [(ngModel)]="checked" [nzIndeterminate]="indeterminate" (ngModelChange)="onAllChecked($event)"></label>
          </th>
          <th style="width:90px; text-align:center; vertical-align:middle">Thao tác</th>
          <th style="width:48px">STT</th>
          <th>Mã dịch vụ</th>
          <th>Tên dịch vụ</th>
          <th>Loại dịch vụ</th>
          <th>Mô tả</th>
          <th>Trạng thái</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of list; let i = index">
          <td>
            <label nz-checkbox [ngModel]="setOfCheckedId.has(getRowId(item))" (ngModelChange)="onItemChecked(getRowId(item), $event)"></label>
          </td>
          <td style="text-align:center">
            <a nz-dropdown nzTrigger="hover" [nzDropdownMenu]="actionMenu" style="display:inline-flex;align-items:center;justify-content:center;width:100%">
              <i nz-icon nzType="unordered-list" nzTheme="outline" class="cursor-pointer" style="font-size:18px;line-height:1;display:block"></i>
            </a>
            <nz-dropdown-menu #actionMenu="nzDropdownMenu">
              <ul nz-menu>
                <li nz-menu-item (click)="viewDetail(item)"><i nz-icon nzType="eye" nzTheme="outline"></i>&nbsp;Xem chi tiết</li>
                <li nz-menu-item (click)="edit(item)"><i nz-icon nzType="edit" nzTheme="outline"></i>&nbsp;Chỉnh sửa</li>
                <li nz-menu-item (click)="activate(getRowId(item))"><i nz-icon nzType="check" nzTheme="outline"></i>&nbsp;Kích hoạt</li>
                <li nz-menu-item (click)="revoke(getRowId(item))" class="text-red-500"><i nz-icon nzType="stop" nzTheme="outline"></i>&nbsp;Thu hồi</li>
                <li nz-menu-item class="text-red-500" (click)="delete(getRowId(item))"><i nz-icon nzType="delete" nzTheme="outline"></i>&nbsp;Xóa</li>
              </ul>
            </nz-dropdown-menu>
          </td>
          <td>{{ (pageNumber - 1) * pageSize + i + 1 }}</td>
          <td>{{ item.maDichVu }}</td>
          <td>{{ item.tenDichVu }}</td>
          <td>{{ item.loaiDichVuTen }}</td>
          <td>{{ item.moTa }}</td>
          <td>{{ item.trangThaiDichVuTen }}</td>
        </tr>
      </tbody>
    </nz-table>
  </app-scroll-table>

  <nz-modal [(nzVisible)]="isModalVisible" [nzTitle]="modalTitle" (nzOnCancel)="cancelModal()" (nzOnOk)="onModalOk()" [nzOkLoading]="saving" nzOkText="Lưu" nzCancelText="Hủy" nzWidth="720" nzWrapClassName="custom-modal wide-modal">
    <ng-container *nzModalContent>
      <app-dich-vu-form #formComp [inModal]="true" [itemId]="editingId" (saved)="onSaved()" (cancelled)="cancelModal()"></app-dich-vu-form>
    </ng-container>
  </nz-modal>

  <div style="display:flex;justify-content:flex-end;margin-top:12px">
    <nz-pagination [nzPageIndex]="pageNumber" [nzPageSize]="pageSize" [nzTotal]="total" (nzPageIndexChange)="onPageChange($event)" (nzPageSizeChange)="onPageSizeChange($event)"></nz-pagination>
  </div>
</div>
