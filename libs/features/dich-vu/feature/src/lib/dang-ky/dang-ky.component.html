<div class="dang-ky">
  <h2>Đăng ký dịch vụ</h2>

  <form nz-form>
    <nz-form-item>
      <nz-form-label [nzSpan]="6">Căn hộ (ID)</nz-form-label>
      <nz-form-control [nzSpan]="14">
        <input nz-input type="number" [(ngModel)]="model.canHoId" name="canHoId" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label [nzSpan]="6">Ngày sử dụng</nz-form-label>
      <nz-form-control [nzSpan]="14">
        <input nz-input type="date" [(ngModel)]="model.ngaySuDung" name="ngaySuDung" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label [nzSpan]="6">Số lượng</nz-form-label>
      <nz-form-control [nzSpan]="14">
        <input nz-input type="number" min="1" [(ngModel)]="model.soLuong" name="soLuong" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item *ngIf="khungGios?.length">
      <nz-form-label [nzSpan]="6">Khung giờ</nz-form-label>
      <nz-form-control [nzSpan]="14">
        <nz-select [(ngModel)]="model.khungGioId" name="khungGioId">
          <nz-option *ngFor="let k of khungGios" [nzLabel]="k.tenKhungGio" [nzValue]="k.id"></nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>

    <div class="actions">
      <button nz-button (click)="submit()" nzType="primary">Đăng ký</button>
      <button nz-button (click)="router.navigate(['../'], { relativeTo: route })">Hủy</button>
    </div>
  </form>
</div>
