<nz-modal [(nzVisible)]="isAddingResident" nzTitle="Thiết lập quan hệ cư trú tại quầy tiếp tân" (nzOnCancel)="cancelRegister()"
  [nzFooter]="null" nzWidth="80%" nzWrapClassName="custom-modal wide-modal">
  <ng-container *nzModalContent>
    <form [formGroup]="registerForm" (ngSubmit)="submitRegister()" style="margin-top:8px">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Họ</label>
          <input nz-input formControlName="lastName" style="border-radius:6px;border:1px solid #e5e7eb;padding:6px 12px;height:36px;box-sizing:border-box" />
        </div>
        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Tên</label>
          <input nz-input formControlName="firstName" style="border-radius:6px;border:1px solid #e5e7eb;padding:6px 12px;height:36px;box-sizing:border-box" />
        </div>
        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Số điện thoại</label>
          <input nz-input formControlName="phoneNumber" style="border-radius:6px;border:1px solid #e5e7eb;padding:6px 12px;height:36px;box-sizing:border-box" />
        </div>

        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Ngày sinh</label>
          <input nz-input type="date" formControlName="dob" style="border-radius:6px;border:1px solid #e5e7eb;padding:6px 12px;height:36px;box-sizing:border-box" />
        </div>
        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">CMND/CCCD</label>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input nz-input formControlName="idCard" (keydown.enter)="onSearchUserByIdCard()"
              style="flex:1;border-radius:6px;padding:6px 12px;border:1px solid #e5e7eb;height:36px;box-sizing:border-box" />
              <button nz-button nzType="default" type="button" (click)="onSearchUserByIdCard()" [nzLoading]="searchLoading"
                style="display:flex;align-items:center;border-radius:6px;padding:4px 12px;font-weight:500;height:36px;box-sizing:border-box;background:#e6f6ff;border:1px solid #60a5fa;color:#0369a1;">Tìm hồ sơ</button>
          </div>
          <div *ngIf="searchError" style="color:#b91c1c;font-size:13px;margin-top:6px">{{ searchError }}</div>
        </div>

        <div class="flex flex-col">
          <label class="mb-2 font-medium text-gray-700">Giới tính</label>
          <nz-radio-group formControlName="gioiTinhId" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:4px">
            <label nz-radio *ngFor="let g of gioiTinhOptions" [nzValue]="g.id">{{ g.name || g.ten || g.label }}</label>
          </nz-radio-group>
        </div>

        <div class="flex flex-col md:col-span-3">
          <label class="mb-2 font-medium text-gray-700">Địa chỉ</label>
          <input nz-input formControlName="diaChi" style="border-radius:6px;border:1px solid #e5e7eb;padding:6px 12px;height:36px;box-sizing:border-box" />
        </div>

        <!-- Documents area simplified -->
        <div class="flex flex-col md:col-span-3 mt-1">
          <label class="mb-2 font-medium text-gray-700">Tài liệu cư trú</label>
          <div style="border-radius:8px;border:1px solid #e5e7eb;padding:10px;background:#fafafa">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
              <button nz-button nzType="default" type="button" (click)="addDocumentCard()" style="display:flex;align-items:center;gap:8px">
                <i nz-icon nzType="upload" nzTheme="outline"></i>
                <span style="margin-left:6px">Tải tài liệu từ thiết bị</span>
              </button>
            </div>

            <input type="file" #cardFileInput multiple style="display:none" (change)="onCardFileInput($event)" />

            <div style="padding-right:2px;clear:both">
              <div *ngFor="let card of documentCards; let i = index" style="margin-top:12px;border:1px solid #e5e7eb;border-radius:8px;padding:10px;display:flex;gap:12px;align-items:start;background:#fff">
                <div style="flex:1">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <div style="font-weight:600">Giấy tờ #{{ i + 1 }}</div>
                    <div style="font-size:12px;color:#6b7280">{{ (card.displayFiles?.length || 0) }} file</div>
                  </div>

                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
                    <div>
                      <label class="mb-1 text-sm text-gray-700">Loại giấy tờ</label>
                      <nz-select [(ngModel)]="card.meta.loaiGiayToId" [ngModelOptions]="{standalone:true}" nzAllowClear nzPlaceHolder="-- Chọn loại giấy tờ --" style="width:100%">
                        <nz-option *ngFor="let o of loaiGiayToOptions" [nzValue]="o.id" [nzLabel]="o.name"></nz-option>
                      </nz-select>
                    </div>
                    <div>
                      <label class="mb-1 text-sm text-gray-700">Số giấy tờ</label>
                      <input nz-input [(ngModel)]="card.meta.soGiayTo" [ngModelOptions]="{standalone:true}" style="border-radius:6px;border:1px solid #e5e7eb;padding:6px 12px;height:36px;box-sizing:border-box" />
                    </div>
                  </div>

                  <div style="margin-top:8px">
                    <label class="mb-1 text-sm text-gray-700">Ngày phát hành</label>
                    <input nz-input type="date" [(ngModel)]="card.meta.ngayPhatHanh" [ngModelOptions]="{standalone:true}" style="border-radius:6px;border:1px solid #e5e7eb;padding:6px 12px;height:36px;box-sizing:border-box" />
                  </div>

                  <div style="margin-top:10px;font-size:13px;color:#374151">
                    <div>File đã thêm:</div>
                    <div *ngIf="card.displayFiles?.length; else noFiles" style="margin-top:6px">
                      <div *ngFor="let df of card.displayFiles; let fileIndex = index" style="padding:6px 8px;border:1px dashed #e5e7eb;border-radius:6px;background:#fff;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px">
                        <span style="word-break:break-all">{{ df.name }}</span>
                        <button nz-button nzType="text" nzDanger type="button" (click)="removeDocumentFile(i, fileIndex)" nz-tooltip nzTooltipTitle="Xóa file">
                          <i nz-icon nzType="delete" nzTheme="outline"></i>
                        </button>
                      </div>
                      <div style="margin-top:8px; width:100%; box-sizing:border-box;">
                        <div style="width:100%; padding:8px; border:1px dashed #e5e7eb; border-radius:6px; background:#fff; display:flex; justify-content:center; align-items:center; box-sizing:border-box">
                          <button nz-button nzType="dashed" type="button" (click)="startAddFileToCard(i, cardFileInput)" style="border-color:#60a5fa;color:#0ea5e9;border-radius:6px;padding:6px 12px;font-weight:600;height:36px;box-sizing:border-box;display:flex;align-items:center;gap:8px">
                            <i nz-icon nzType="plus" nzTheme="outline" style="font-size:16px;line-height:1;color:currentColor"></i>
                            <span style="font-weight:600;color:currentColor;text-align:center">Thêm file</span>
                          </button>
                        </div>
                      </div>
                    </div>
                    <ng-template #noFiles>
                      <div style="margin-top:6px;padding:12px;border:1px dashed #e5e7eb;border-radius:6px;background:#fff;color:#6b7280;display:flex;align-items:center;justify-content:center;width:100%;box-sizing:border-box">
                        <button nz-button nzType="dashed" type="button" (click)="startAddFileToCard(i, cardFileInput)" style="border-color:#60a5fa;color:#0ea5e9;border-radius:6px;padding:6px 12px;font-weight:600;height:36px;box-sizing:border-box;display:flex;align-items:center;gap:8px">
                          <i nz-icon nzType="plus" nzTheme="outline" style="font-size:18px;line-height:1;color:currentColor"></i>
                          <span style="font-weight:600;color:currentColor">Thêm file</span>
                        </button>
                      </div>
                    </ng-template>
                  </div>
                </div>

                <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
                  <button nz-button nzType="default" nzDanger (click)="removeDocumentCard(i)" type="button" style="display:flex;align-items:center;gap:8px">
                    <i nz-icon nzType="delete" nzTheme="outline"></i>
                    <span>Xóa giấy tờ</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-3" *ngIf="foundUser">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div class="flex flex-col">
            <label class="mb-2 font-medium text-gray-700">Loại quan hệ cư trú</label>
            <nz-select [(ngModel)]="selectedLoaiQuanHeCuTruId" [ngModelOptions]="{standalone: true}" nzAllowClear nzPlaceHolder="-- Chọn loại quan hệ cư trú --" style="width:100%">
              <nz-option *ngFor="let t of loaiQuanHeOptions" [nzValue]="t.id" [nzLabel]="t.name || t.ten || t.tenLoaiQuanHeCuTru || t.label"></nz-option>
            </nz-select>
          </div>

          <div class="flex flex-col">
            <label class="mb-2 font-medium text-gray-700">Ngày bắt đầu cư trú</label>
            <input nz-input type="date" [(ngModel)]="ngayBatDau" [ngModelOptions]="{standalone:true}" />
          </div>

          <div></div>
        </div>
      </div>

      <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end">
        <button nz-button type="button" (click)="cancelRegister()">Đóng</button>
        <button nz-button nzType="default" [nzLoading]="registerLoading" type="submit">Tạo hồ sơ cư dân</button>
        <button nz-button nzType="primary" type="button" (click)="setResidence()" [nzLoading]="setResidenceLoading">Thiết lập cư trú</button>
      </div>
    </form>
  </ng-container>
</nz-modal>

<!-- Edit modal -->
<nz-modal [(nzVisible)]="editModalVisible" nzTitle="Cập nhật quan hệ cư trú" (nzOnCancel)="closeEdit()" [nzFooter]="null" nzWidth="520" nzWrapClassName="custom-modal">
  <ng-container *nzModalContent>
    <form [formGroup]="editForm" (ngSubmit)="submitEdit()" style="margin-top:8px">
      <div class="grid grid-cols-1 gap-3">
        <div class="flex flex-col">
          <label class="mb-1 text-sm text-gray-700">Loại quan hệ cư trú</label>
          <nz-select formControlName="loaiQuanHeCuTruId" nzAllowClear nzPlaceHolder="-- Chọn loại quan hệ cư trú --" style="width:100%">
            <nz-option *ngFor="let t of loaiQuanHeOptions" [nzValue]="t.id" [nzLabel]="t.name || t.ten || t.tenLoaiQuanHeCuTru || t.label"></nz-option>
          </nz-select>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">
        <button nz-button type="button" (click)="closeEdit()">Hủy</button>
        <button nz-button nzType="primary" [nzLoading]="editLoading" type="submit">Lưu</button>
      </div>
    </form>
  </ng-container>
</nz-modal>
