<div class="p-4" style="min-width:320px">
  <!-- <h3 class="text-lg font-semibold mb-3">Gán thẻ phương tiện</h3> -->
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label class="block mb-2">Mã thẻ</label>
    <input nz-input formControlName="maThe" placeholder="Nhập mã thẻ" />

    <div class="mt-4" style="display:flex;justify-content:flex-end;gap:8px">
      <button nz-button type="button" (click)="cancel()">Hủy</button>
      <button nz-button nzType="primary" [nzLoading]="saving" [disabled]="form.invalid">Lưu</button>
    </div>
  </form>
</div>
