<div class="min-h-screen flex items-center justify-center bg-background-light p-6">
  <div class="w-full max-w-6xl rounded-2xl overflow-hidden shadow-2xl flex bg-white">
    <div class="hidden lg:flex lg:w-2/5 relative overflow-hidden">
      <div class="absolute inset-0 bg-cover bg-center filter brightness-75"
        style="background-image:url('/assets/images/login.jpg')">
      </div>
      <div class="absolute inset-0"
        style="background: linear-gradient(135deg, rgba(91, 130, 206, 0.9) 0%, rgba(193, 204, 249, 0.35) 100%);">
      </div>
      <div class="relative z-10 flex flex-col justify-end p-16 text-white max-w-2xl">
        <!-- <div class="mb-6 flex items-center gap-3">
          <i nz-icon nzType="bank" nzTheme="outline" class="text-white text-3xl"></i>
          <h2 class="text-2xl font-bold tracking-tight text-white">Smart Apartment Management</h2>
        </div> -->
        <h1 class="text-4xl font-black leading-tight mb-4 text-white">Hệ thống Quản lý Vận hành Chung cư Thông minh
          TPHCM
        </h1>
        <p class="text-lg text-white font-medium opacity-90">Giải pháp quản lý vận hành chung cư hiện đại, tối ưu hóa
          quy trình và nâng cao hiệu quả quản trị.</p>
      </div>
    </div>
    <div class="hidden lg:block w-px bg-slate-100/40"></div>
    <div class="w-full lg:w-3/5 flex items-center justify-center bg-white px-8 md:px-16 lg:px-24">
      <div class="w-full max-w-xl flex flex-col gap-8 py-16">
        <div class="flex flex-col gap-3">
          <div class="flex items-center gap-3">
            <span class="w-1.5 h-8 bg-primary rounded-md"></span>
            <h3 class="text-4xl font-extrabold text-slate-900 tracking-tight">Chào mừng trở lại</h3>
          </div>
          <p class="text-sm text-slate-400">Quản lý vận hành chung cư — hiệu quả, an toàn, thông minh.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1">Tên đăng nhập<span
                class="text-red-600">*</span></label>
            <div class="relative flex items-center">
              <span class="absolute left-4 text-slate-400">
                <i nz-icon nzType="user" nzTheme="outline" class="text-slate-400"></i>
              </span>
              <input formControlName="username"
                [class.input-error]="((form.get('username')?.invalid && (submitted || form.get('username')?.dirty)) || usernameErrors.length>0)"
                class="w-full h-14 pl-12 pr-10 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary outline-none"
                placeholder="Tên đăng nhập" />
              <span *ngIf="(usernameErrors?.length || waiting)" nz-tooltip class="absolute right-3 field-tooltip"
                [nzTooltipTitle]="usernameErrors?.length ? usernameErrors.join('\n') : (waiting ? pendingTooltip : '')">
                <i nz-icon nzType="info-circle" nzTheme="outline" class="text-red-500"></i>
              </span>
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <div class="flex justify-between items-center ml-1">
              <label class="text-sm font-semibold text-slate-700">Mật khẩu <span class="text-red-600">*</span></label>
            </div>
            <div class="relative flex items-center">
              <span class="absolute left-4 text-slate-400">
                <i nz-icon nzType="lock" nzTheme="outline" class="text-slate-400"></i>
              </span>
              <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                [class.input-error]="((form.get('password')?.invalid && (submitted || form.get('password')?.dirty)) || passwordErrors.length>0)"
                class="w-full h-14 pl-12 pr-14 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary outline-none"
                placeholder="••••••••" />
              <button type="button" class="absolute right-3 text-slate-400 hover:text-primary"
                (click)="togglePassword(); $event.stopPropagation(); $event.preventDefault();"
                aria-label="Toggle password visibility">
                <i *ngIf="!showPassword" nz-icon nzType="eye-invisible" nzTheme="outline" class="text-slate-400"></i>
                <i *ngIf="showPassword" nz-icon nzType="eye" nzTheme="outline" class="text-slate-400"></i>
              </button>
              <span *ngIf="(passwordErrors?.length || waiting)" nz-tooltip class="absolute right-10 field-tooltip"
                [nzTooltipTitle]="passwordErrors?.length ? passwordErrors.join('\n') : (waiting ? pendingTooltip : '')">
                <i nz-icon nzType="info-circle" nzTheme="outline" class="text-red-500"></i>
              </span>
            </div>
          </div>
          <!-- có bạn Trí hồi trước định vào thực tập chung với bạn Khánh á anh, mà lúc đó bạn nghỉ ko học lên kỹ sư nữa nên ko có váo thực tập
           giờ bạn muốn xin vào, công ty mình có tuyển ko a-->
          <div class="flex items-center justify-between mt-1">
            <!-- <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-primary" />
              <span class="text-sm text-slate-600">Ghi nhớ đăng nhập</span>
            </label> -->
            <a class="ml-auto text-sm font-semibold text-primary" href="#">Quên mật khẩu?</a>
          </div>

          <div *ngIf="errorMessages?.length" class="text-red-600 text-sm">
            <ul class="list-disc ml-5">
              <li *ngFor="let e of errorMessages">{{ e }}</li>
            </ul>
          </div>
          <button type="submit" [disabled]="loading"
            class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-primary/90 flex items-center justify-center gap-2">
            <span *ngIf="!loading">Đăng nhập hệ thống</span>
            <span *ngIf="loading">Đang xử lý...</span>
            <i nz-icon nzType="login" nzTheme="outline" class="text-white text-lg"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
