<div class="min-h-[320px] flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6">
    <div class="flex items-center gap-3 mb-4">
      <div class="p-2 rounded-full bg-gradient-to-br from-indigo-50 to-indigo-100">
        <i nz-icon nzType="lock" nzTheme="outline" class="text-indigo-600 text-xl"></i>
      </div>
        <h3 class="text-xl font-semibold">Đổi mật khẩu</h3>
    </div>

    <nz-spin [nzSpinning]="loading">
      <form nz-form class="space-y-3">
        <div nz-form-item>
          <label class="block text-sm text-gray-700 mb-1">Mật khẩu hiện tại</label>
          <div class="relative">
            <input nz-input [type]="showOld ? 'text' : 'password'" [(ngModel)]="model.oldPassword" name="old"
              placeholder="Nhập mật khẩu hiện tại" class="w-full rounded-lg border px-3 py-2" />
            <i nz-icon [nzType]="showOld ? 'eye' : 'eye-invisible'" nzTheme="outline"
              class="absolute right-3 top-2.5 text-gray-500 cursor-pointer" (click)="showOld = !showOld"></i>
          </div>
        </div>

        <div nz-form-item>
          <label class="block text-sm text-gray-700 mb-1">Mật khẩu mới</label>
          <div class="relative">
            <input nz-input [type]="showNew ? 'text' : 'password'" [(ngModel)]="model.newPassword" name="new"
              placeholder="Nhập mật khẩu mới" class="w-full rounded-lg border px-3 py-2" />
            <i nz-icon [nzType]="showNew ? 'eye' : 'eye-invisible'" nzTheme="outline"
              class="absolute right-3 top-2.5 text-gray-500 cursor-pointer" (click)="showNew = !showNew"></i>
          </div>
        </div>

        <div nz-form-item>
          <label class="block text-sm text-gray-700 mb-1">Xác nhận mật khẩu</label>
          <div class="relative">
            <input nz-input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="model.confirmPassword"
              name="confirm" placeholder="Nhập lại mật khẩu mới" class="w-full rounded-lg border px-3 py-2" />
            <i nz-icon [nzType]="showConfirm ? 'eye' : 'eye-invisible'" nzTheme="outline"
              class="absolute right-3 top-2.5 text-gray-500 cursor-pointer" (click)="showConfirm = !showConfirm"></i>
          </div>
        </div>

        <!-- <div *ngIf="error" class="text-sm text-red-600">{{ error }}</div> -->

        <div class="flex justify-end gap-3 mt-4">
          <button nz-button (click)="cancel()" class="rounded-full">Hủy</button>
          <button nz-button nzType="primary" nzShape="round" [nzLoading]="loading" (click)="submit()" class="px-6">Đổi
            mật khẩu</button>
        </div>
      </form>
    </nz-spin>
  </div>
</div>
