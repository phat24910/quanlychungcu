<form [formGroup]="form" (ngSubmit)="submit()" class="max-h-[85vh] overflow-y-auto px-2">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="col-span-2">
      <label class="block mb-1 font-medium text-gray-700">Tiêu đề đợt khảo sát/bầu cử</label>
      <input nz-input formControlName="tieuDe" placeholder="Ví dụ: Bầu cử Ban Quản Trị nhiệm kỳ 2026-2029"
        class="h-11 rounded-lg" />
    </div>

    <div class="col-span-2">
      <label class="block mb-1 font-medium text-gray-700">Mô tả chi tiết</label>
      <textarea nz-input formControlName="moTa" rows="3"
        placeholder="Nhập nội dung tóm tắt mục đích của đợt khảo sát này..." class="rounded-lg"></textarea>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Loại hình</label>
      <nz-select formControlName="loaiKhaoSatId" class="w-full rounded-lg h-11">
        <nz-option [nzValue]="1" nzLabel="Khảo sát ý kiến cư dân"></nz-option>
        <nz-option [nzValue]="2" nzLabel="Biểu quyết nghị quyết tòa nhà"></nz-option>
        <nz-option [nzValue]="3" nzLabel="Bầu cử Ban Quản Trị"></nz-option>
      </nz-select>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Cơ chế tính kết quả</label>
      <nz-select formControlName="coCheTinhDiemId" class="w-full rounded-lg h-11">
        <nz-option [nzValue]="1" nzLabel="Một căn hộ - Một phiếu bầu"></nz-option>
        <nz-option [nzValue]="2" nzLabel="Theo diện tích sở hữu riêng (m²)"></nz-option>
      </nz-select>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Thời gian bắt đầu</label>
      <nz-date-picker formControlName="ngayBatDau" nzShowTime class="w-full rounded-lg h-11"></nz-date-picker>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Thời gian kết thúc</label>
      <nz-date-picker formControlName="ngayKetThuc" nzShowTime class="w-full rounded-lg h-11"></nz-date-picker>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Tỷ lệ tham gia tối thiểu (%)</label>
      <nz-input-number formControlName="tyleThamGiaToiThieu" [nzMin]="0" [nzMax]="100"
        class="w-full rounded-lg h-11 flex items-center"></nz-input-number>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Tỷ lệ đồng ý tối thiểu (%)</label>
      <nz-input-number formControlName="tyLeDongYToiThieu" [nzMin]="0" [nzMax]="100"
        class="w-full rounded-lg h-11 flex items-center"></nz-input-number>
    </div>

    <div class="col-span-2 mt-2">
      <label nz-checkbox formControlName="isAnDanh" class="text-sm font-semibold text-gray-600">Cho phép bỏ phiếu ẩn
        danh (Không lưu ID cư dân công khai)</label>
    </div>
  </div>

  <div class="mt-8 pt-6 border-t border-gray-100">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-lg font-bold text-indigo-900 flex items-center gap-2">
        <i nz-icon nzType="question-circle" class="text-indigo-500"></i> Danh sách câu hỏi
      </h3>
      <button type="button" nz-button nzType="dashed" (click)="addQuestion()"
        class="rounded-lg border-indigo-300 text-indigo-600 hover:bg-indigo-50">
        <i nz-icon nzType="plus-circle"></i> Thêm câu hỏi
      </button>
    </div>

    <div formArrayName="cauHois" class="space-y-6">
      <div *ngFor="let q of cauHois.controls; let i = index" [formGroupName]="i"
        class="bg-gray-50/50 p-6 rounded-2xl border border-gray-200 relative group/q">
        <button type="button" (click)="removeQuestion(i)"
          class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-colors bg-white w-8 h-8 rounded-full shadow-sm flex items-center justify-center opacity-0 group-hover/q:opacity-100 border border-gray-100 cursor-pointer">
          <i nz-icon nzType="close"></i>
        </button>

        <div class="grid grid-cols-12 gap-4">
          <div class="col-span-12">
            <label class="block mb-1 font-medium text-gray-700">Câu hỏi {{ i + 1 }}</label>
            <input nz-input formControlName="noiDungCauHoi" placeholder="Nhập nội dung câu hỏi..."
              class="h-10 rounded-lg font-semibold" />
          </div>

          <div class="col-span-6 flex gap-4 mt-2">
            <label nz-checkbox formControlName="isBatBuoc" class="text-xs font-medium text-gray-500">Bắt buộc</label>
            <label nz-checkbox formControlName="isMultiSelect" class="text-xs font-medium text-gray-500">Chọn nhiều
              phương án</label>
          </div>

          <div class="col-span-12 mt-4">
            <div class="flex justify-between items-center mb-3">
              <label class="text-[10px] font-bold text-gray-400 tracking-widest">Các phương án lựa chọn</label>
              <button type="button" nz-button nzType="link" nzSize="small" (click)="addOption(asFormGroup(q))"
                class="text-indigo-600 font-bold text-xs p-0 h-auto">
                + Thêm lựa chọn
              </button>
            </div>

            <div formArrayName="luaChons" class="space-y-2">
              <div *ngFor="let o of getOptions(asFormGroup(q)).controls; let j = index" [formGroupName]="j"
                class="flex items-center gap-3 bg-white p-2 pr-4 rounded-xl border border-gray-100 shadow-sm transition-all hover:border-indigo-200">
                <div
                  class="w-6 h-6 rounded-full bg-gray-100 text-gray-400 text-[10px] flex items-center justify-center font-bold">
                  {{ j + 1 }}
                </div>
                <input nz-input formControlName="noiDungLuaChon" placeholder="Nội dung phương án..."
                  class="flex-1 border-none shadow-none focus:ring-0 text-sm h-8" />

                <div class="flex flex-col gap-2 ml-4 flex-1" *ngIf="form.get('loaiKhaoSatId')?.value === 3">
                  <label nz-checkbox formControlName="isUngVienBQT" class="text-[11px] text-gray-400">Là ứng viên
                    BQT</label>
                  <textarea *ngIf="asFormGroup(o).get('isUngVienBQT')?.value" nz-input formControlName="tieuSuUngVien"
                    rows="2" placeholder="Nhập tóm tắt tiểu sử ứng cử viên..."
                    class="text-xs rounded-lg mt-1"></textarea>
                </div>

                <button type="button" (click)="removeOption(asFormGroup(q), j)"
                  class="text-gray-300 hover:text-red-400 transition-colors bg-transparent border-none p-0 h-auto cursor-pointer">
                  <i nz-icon nzType="minus-circle"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-8 flex justify-end gap-3 sticky bottom-0 bg-white py-4 border-t border-gray-100">
    <button nz-button type="button" (click)="cancel()"
      class="h-10 px-6 rounded-lg font-semibold text-gray-500 border-gray-200 hover:bg-gray-50">Hủy bỏ</button>
    <button nz-button nzType="primary" [nzLoading]="loading"
      class="h-10 px-10 rounded-lg font-bold shadow-lg shadow-indigo-200">
      {{ isEdit ? 'Cập nhật khảo sát' : 'Lưu bản nháp' }}
    </button>
  </div>
</form>
